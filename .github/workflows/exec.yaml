name: exec

on:
  push:
    paths:
      - 'exec/**'
      - '.github/workflows/exec.yaml'
    tags:
      - 'exec/v*'
    branches:
      - '**'
  pull_request:
    paths:
      - 'exec/**'
      - '.github/workflows/exec.yaml'

  schedule:
    - cron: '17 0 * * 0' # Every Sunday at 12:17 am

env:
  GOVERSION: '1.22.x'
  GOLANGCI_LINT_VERSION: v2.11.4

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./exec
    steps:
      - name: 🟣 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}

      - name: 🧳 Checkout
        uses: actions/checkout@v4

      - name: 🔃 Restore
        run: go mod tidy

      - name: 🏭 Build
        run: go build -v ./...

      - name: 🧪 Test
        run: go test -v ./...

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./exec
    steps:
      - name: 🧳 Checkout
        uses: actions/checkout@v4

      - name: 🟣 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}

      - name: 🧹 golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: exec

  vuln:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./exec
    steps:
      - name: 🧳 Checkout
        uses: actions/checkout@v4

      - name: 🟣 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GOVERSION }}

      - name: 🔐 govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/exec/')
    needs: [build, lint, vuln]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 🧳 Checkout
        uses: actions/checkout@v4

      - name: 📣 Create release with generated notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ver="${GITHUB_REF_NAME#exec/}"
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            --title "exec ${ver}"
